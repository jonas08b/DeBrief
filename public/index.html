<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>DeBrief</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap');

  @font-face {
    font-family: 'Roobert';
    src: url('Roobert-Regular.woff') format('woff');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Roobert';
    src: url('Roobert-Bold.woff') format('woff');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg: #F5F2EC;
    --bg-card: #FFFFFF;
    --ink: #1A1814;
    --ink-muted: #6B6760;
    --ink-faint: #B8B4AE;
    --accent: #C8311A;
    --accent-soft: #F5EDE9;
    --eu-color: #1A3A8F;
    --eu-bg: #EBF0FB;
    --be-color: #1A5C2A;
    --be-bg: #EBF5EF;
    --world-color: #7B3F00;
    --world-bg: #F7F0E8;
    --border: #E5E1DA;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --font-sans: 'Roobert','DM Sans',-apple-system,system-ui,sans-serif;
    --font-serif: 'DM Serif Display','Georgia',serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1.5px solid var(--ink);
    padding: calc(var(--safe-top) + 14px) 20px 0;
  }
  .header-top {
    display: flex; align-items: baseline;
    justify-content: space-between; padding-bottom: 10px;
  }
  .logo { font-family: var(--font-serif); font-size: 28px; letter-spacing: -.5px; line-height: 1; }
  .logo span { color: var(--accent); }
  .date-badge { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-muted); }

  /* ── TAB BAR ONDERAAN ── */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    display: flex; align-items: stretch;
    padding-bottom: var(--safe-bottom);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px;
    padding: 8px 2px; border: none; background: none;
    color: var(--ink-faint); font-size: 9px; font-weight: 600;
    letter-spacing: .04em; text-transform: uppercase;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: color .15s; white-space: nowrap; min-width: 0;
  }
  .tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .tab.active { color: var(--accent); }
  .tab.active svg { stroke-width: 2.4; }

  /* ── SOURCE ROW ── */
  .source-row-wrap {
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    border-top: 1px solid var(--border); padding: 8px 0 9px;
  }
  .source-row-wrap::-webkit-scrollbar { display: none; }
  .source-row { display: flex; gap: 6px; width: max-content; padding: 0 20px; }
  .source-chip {
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    padding: 4px 12px; border-radius: 20px;
    border: 1.5px solid var(--border); background: none; color: var(--ink-muted);
    cursor: pointer; white-space: nowrap; transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .source-chip.active { background: var(--ink); border-color: var(--ink); color: var(--bg); }

  /* ── FEED ── */
  .feed { padding: 20px 16px calc(var(--safe-bottom) + 80px); max-width: 680px; margin: 0 auto; }

  /* ── STATUS ── */
  .status-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 50vh; gap: 14px; color: var(--ink-muted);
  }
  .spinner {
    width: 30px; height: 30px; border: 2.5px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-msg { font-size: 13px; color: var(--ink-muted); }

  /* ── TOP STORY ── */
  .top-story {
    display: block; text-decoration: none; color: inherit;
    background: var(--bg-card); border: 1.5px solid var(--ink);
    border-radius: 4px; overflow: hidden; margin-bottom: 16px;
    -webkit-tap-highlight-color: transparent; transition: transform .12s;
    animation: fadeUp .3s ease both;
  }
  .top-story:active { transform: scale(.99); }
  .top-story-img { width: 100%; height: 210px; object-fit: cover; display: block; background: var(--border); }
  .top-story-body { padding: 16px; }
  .top-story .meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .top-badge {
    font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    background: var(--accent); color: #fff; padding: 3px 7px; border-radius: 2px;
  }
  .top-story h2 {
    font-family: var(--font-serif); font-size: 21px; line-height: 1.25;
    letter-spacing: -.2px; color: var(--ink); margin-bottom: 8px;
  }

  /* ── SECTION HEADING ── */
  .section-head { display: flex; align-items: center; gap: 10px; margin: 22px 0 12px; }
  .section-head h3 {
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--ink-muted); white-space: nowrap;
    order: 0;
  }
  .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); order: 1; }
  .section-head .count-chip { order: 2; }

  /* ── ARTICLE CARD ── */
  .article-card {
    display: flex; text-decoration: none; color: inherit;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden; margin-bottom: 10px; min-height: 96px;
    -webkit-tap-highlight-color: transparent; transition: border-color .12s, transform .12s;
    animation: fadeUp .3s ease both;
  }
  .article-card:active { transform: scale(.99); border-color: var(--ink-faint); }
  .article-card.seen { opacity: .5; }
  .article-card.seen h3 { color: var(--ink-muted); }
  .article-card-img {
    width: 96px; min-width: 96px; height: 96px;
    object-fit: cover; flex-shrink: 0; background: var(--border);
  }
  .article-card-placeholder {
    width: 96px; min-width: 96px; height: 96px; flex-shrink: 0;
    background: linear-gradient(135deg,#EDEAE4 0%,#DDD9D2 100%);
  }
  .article-card-body {
    padding: 11px 14px; flex: 1; display: flex;
    flex-direction: column; justify-content: space-between; min-width: 0;
  }
  .article-card h3 {
    font-size: 14px; font-weight: 600; line-height: 1.35; color: var(--ink);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden; margin-bottom: 8px;
  }

  /* ── META ROW ── */
  .meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .source-time { font-size: 11px; color: var(--ink-faint); white-space: nowrap; }
  .count-chip {
    font-size: 11px; font-weight: 600;
    background: var(--accent-soft); color: var(--accent);
    padding: 2px 8px; border-radius: 10px; margin-left: 4px;
  }

  /* ── LABELS ── */
  .label {
    font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 2px; white-space: nowrap;
  }
  .label-eu, .label-be, .label-world {
    font-size: 13px; letter-spacing: 0; text-transform: none; padding: 0 3px;
    background: none;
  }
  .label-eu      { color: var(--eu-color); }
  .label-be      { color: var(--be-color); }
  .label-world   { color: var(--world-color); }
  .label-politiek{ background: #F0EBF8; color: #5C2D91; }
  .label-economie{ background: #FFF4E5; color: #8B4500; }
  .label-binnenland{ background: #EBF5EF; color: #1A5C2A; }
  .label-buitenland{ background: #F7F0E8; color: #7B3F00; }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    position: fixed; top: 0; left: 0; height: 2px;
    background: var(--accent); width: 0%; z-index: 999;
    transition: width .25s ease;
  }

  /* ── PULL TO REFRESH ── */
  .ptr-indicator {
    display: flex; align-items: center; justify-content: center;
    height: 0; overflow: hidden; transition: height .2s ease;
    color: var(--ink-muted); font-size: 12px; gap: 8px;
  }
  .ptr-indicator.visible { height: 48px; }
  .ptr-spinner {
    width: 18px; height: 18px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
  }
  .ptr-spinner.spinning { animation: spin .8s linear infinite; }

  /* ── ERROR ── */
  .error-banner {
    background: #FFF0F0; border: 1px solid #FFCDD2;
    border-radius: 4px; padding: 10px 14px;
    font-size: 12px; color: #B71C1C; margin-bottom: 12px;
  }

  /* ── EMPTY ── */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--ink-muted); }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; display: block; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .article-card:nth-child(2) { animation-delay:.05s }
  .article-card:nth-child(3) { animation-delay:.10s }
  .article-card:nth-child(4) { animation-delay:.15s }
  .article-card:nth-child(5) { animation-delay:.20s }
  .article-card:nth-child(6) { animation-delay:.25s }
  .article-card:nth-child(7) { animation-delay:.30s }
  .article-card:nth-child(8) { animation-delay:.35s }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16140F; --bg-card: #201E18; --ink: #F0EDE6;
      --ink-muted: #9A9690; --ink-faint: #5A5750; --border: #2E2B24;
      --accent-soft: #2E1810; --eu-bg: #0D1830; --be-bg: #0C2010; --world-bg: #231500;
    }
    .article-card-placeholder { background: linear-gradient(135deg,#2A2720 0%,#1E1C18 100%); }
    .source-chip.active { background: var(--ink); color: var(--bg); }
    .tab-bar { background: rgba(32,30,24,.92); }
    .label-politiek  { background: #1E1030; color: #C4A0F5; }
    .label-economie  { background: #231500; color: #F0A040; }
    .label-binnenland{ background: var(--be-bg);    color: #6ADA8A; }
    .label-buitenland{ background: var(--world-bg); color: #D4945A; }
  }

  /* ── ARTICLE POPUP ── */
  .popup-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,.45);
    opacity: 0; pointer-events: none;
    transition: opacity .25s ease;
  }
  .popup-overlay.open { opacity: 1; pointer-events: all; }

  .popup-sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 301;
    background: var(--bg-card);
    border-radius: 18px 18px 0 0;
    padding: 0 0 calc(var(--safe-bottom) + 12px);
    max-height: 80vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    -webkit-overflow-scrolling: touch;
  }
  .popup-sheet.open { transform: translateY(0); }

  .popup-header {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 10px 20px 0;
  }
  .popup-close {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--border); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-muted); font-size: 18px; line-height: 1;
    -webkit-tap-highlight-color: transparent; transition: background .15s;
    flex-shrink: 0;
  }
  .popup-close:hover { background: var(--ink-faint); }
  .popup-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--ink-faint); margin: 12px auto 16px;
  }
  .popup-body { padding: 0 20px 8px; }
  .popup-title {
    font-family: var(--font-serif); font-size: 20px; line-height: 1.3;
    letter-spacing: -.2px; color: var(--ink); margin-bottom: 12px;
  }
  .popup-desc {
    font-size: 14px; line-height: 1.65; color: var(--ink-muted);
    margin-bottom: 20px;
  }
  .popup-btn {
    display: block; width: 100%; padding: 14px;
    background: var(--ink); color: var(--bg-card);
    font-family: var(--font-sans); font-size: 14px; font-weight: 600;
    text-align: center; text-decoration: none;
    border-radius: 10px; border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background .15s;
  }
  .popup-btn:hover  { background: var(--accent); }
  .popup-btn:active { background: var(--accent); }

  @media (prefers-color-scheme: dark) {
    .popup-sheet { background: var(--bg-card); }
    .popup-close { background: var(--border); color: var(--ink-muted); }
    .popup-close:hover { background: var(--ink-faint); }
  }

  /* ── MARKT PANEL ── */
  .markt-panel {
    position: fixed; inset: 0;
    top: 0; z-index: 50;
    background: var(--bg);
    padding: calc(var(--safe-top) + 90px) 0 calc(var(--safe-bottom) + 80px);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }

  .markt-search-wrap { padding: 0 16px 12px; }
  .markt-search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 0 12px; height: 42px;
  }
  .markt-search-icon {
    width: 16px; height: 16px; flex-shrink: 0;
    stroke: var(--ink-faint); fill: none;
    stroke-width: 2; stroke-linecap: round;
  }
  .markt-search-input {
    flex: 1; border: none; background: none; outline: none;
    font-family: var(--font-sans); font-size: 14px; color: var(--ink);
  }
  .markt-search-input::placeholder { color: var(--ink-faint); }
  .markt-search-submit {
    font-family: var(--font-sans); font-size: 12px; font-weight: 600;
    color: var(--accent); background: none; border: none; cursor: pointer;
    padding: 4px 0; white-space: nowrap;
  }

  /* Ticker list */
  .markt-ticker-list { padding: 0 16px; }
  .markt-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--ink-faint);
    margin: 16px 0 8px;
  }
  .markt-ticker-row {
    display: flex; align-items: center;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    margin-bottom: 8px; cursor: pointer;
    transition: border-color .12s, transform .12s;
    -webkit-tap-highlight-color: transparent;
    gap: 12px;
  }
  .markt-ticker-row:active { transform: scale(.99); border-color: var(--ink-faint); }
  .markt-ticker-info { flex: 1; min-width: 0; }
  .markt-ticker-symbol { font-size: 13px; font-weight: 700; color: var(--ink); }
  .markt-ticker-name { font-size: 11px; color: var(--ink-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .markt-ticker-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .markt-ticker-price { font-size: 14px; font-weight: 600; color: var(--ink); }
  .markt-ticker-change {
    font-size: 11px; font-weight: 600;
    padding: 2px 7px; border-radius: 4px;
  }
  .markt-ticker-change.pos { background: #E6F4EC; color: #1A7A3A; }
  .markt-ticker-change.neg { background: #FDECEA; color: #C8311A; }
  .markt-ticker-change.neu { background: var(--border); color: var(--ink-muted); }

  /* Swipe to delete */
  .markt-swipe-wrap {
    position: relative; overflow: hidden;
    border-radius: 8px; margin-bottom: 8px;
  }
  .markt-swipe-wrap .markt-ticker-row {
    margin-bottom: 0; border-radius: 0;
    transition: transform .25s ease;
    position: relative; z-index: 1;
  }
  .markt-swipe-delete {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 80px; background: #C8311A;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 12px; font-weight: 700;
    letter-spacing: .04em; text-transform: uppercase;
    cursor: pointer; z-index: 0;
  }

  /* Detail */
  .markt-detail { padding: 0 16px 24px; animation: fadeUp .2s ease both; }
  .markt-detail-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .markt-back-btn {
    display: flex; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer;
    font-family: var(--font-sans); font-size: 13px; font-weight: 600;
    color: var(--accent); padding: 0;
  }
  .markt-back-btn svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .markt-watchlist-btn {
    font-size: 12px; font-weight: 600; padding: 6px 14px;
    border-radius: 20px; cursor: pointer;
    font-family: var(--font-sans);
    transition: all .15s; -webkit-tap-highlight-color: transparent;
  }
  .markt-watchlist-btn.add { background: var(--accent); color: #fff; border: none; }
  .markt-watchlist-btn.remove { background: none; border: 1.5px solid var(--border); color: var(--ink-muted); }

  .markt-detail-hero {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 20px;
  }
  .markt-detail-name { font-family: var(--font-serif); font-size: 22px; line-height: 1.2; color: var(--ink); }
  .markt-detail-symbol { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
  .markt-detail-price-wrap { text-align: right; }
  .markt-detail-price { font-size: 24px; font-weight: 700; color: var(--ink); }
  .markt-detail-change { font-size: 14px; font-weight: 600; margin-top: 4px; }
  .markt-detail-change.pos { color: #1A7A3A; }
  .markt-detail-change.neg { color: #C8311A; }
  .markt-detail-change.neu { color: var(--ink-muted); }

  /* Period row */
  .markt-period-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .markt-period {
    font-family: var(--font-sans); font-size: 12px; font-weight: 600;
    padding: 5px 12px; border-radius: 20px;
    border: 1.5px solid var(--border); background: none;
    color: var(--ink-muted); cursor: pointer;
    transition: all .15s; -webkit-tap-highlight-color: transparent;
  }
  .markt-period.active { background: var(--ink); border-color: var(--ink); color: var(--bg); }

  /* Custom dates */
  .markt-custom-dates {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px; flex-wrap: wrap;
  }
  .markt-date-input {
    font-family: var(--font-sans); font-size: 13px;
    padding: 6px 10px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--bg-card);
    color: var(--ink); outline: none;
  }
  .markt-date-sep { color: var(--ink-muted); font-size: 13px; }
  .markt-date-apply {
    font-family: var(--font-sans); font-size: 12px; font-weight: 600;
    padding: 6px 14px; border-radius: 8px;
    background: var(--accent); color: #fff; border: none; cursor: pointer;
  }

  /* Chart */
  .markt-chart-wrap {
    position: relative; background: transparent;
    border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; margin-bottom: 16px; height: 300px;
  }
  #marktTVWidget { height: 100%; width: 100%; }
  #marktTVWidget iframe { border: none !important; }


  /* Stats row */
  .markt-stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .markt-stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
  }
  .markt-stat-label { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 4px; }
  .markt-stat-value { font-size: 15px; font-weight: 700; color: var(--ink); }
  .markt-stat-value.pos { color: #1A7A3A; }
  .markt-stat-value.neg { color: #C8311A; }

  .markt-ticker-skeleton {
    height: 68px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 8px;
    background: linear-gradient(90deg, var(--bg-card) 25%, var(--border) 50%, var(--bg-card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }


  .markt-loading-dot {
    display: inline-block; width: 6px; height: 6px;

function formatDate() {

function timeAgo(ds) {
  if (!ds) return '';
  try {
    const m = (Date.now() - new Date(ds).getTime()) / 60000;
    if (m < 1)    return 'zojuist';
    if (m < 60)   return `${Math.round(m)}m geleden`;
    if (m < 1440) return `${Math.round(m/60)}u geleden`;
    return new Date(ds).toLocaleDateString('nl-BE',{day:'numeric',month:'short'});
  } catch { return ''; }
}

// ── HLN URL-BASED CATEGORISATION ─────────────────────────────────────────────
// Returns: category string, 'verwijder' (filter out), or null (no match)
function categoriseHLN(url) {
  if (!url) return null;
  const u = url.toLowerCase();

  // Enkel deze urls worden geaccepteerd, alle andere worden verwijderd
  if (/hln\.be\/binnenland/.test(u)) return 'binnenland';
  if (/hln\.be\/buitenlands-voetbal/.test(u)) return 'verwijder';
  if (/hln\.be\/buitenland/.test(u)) return 'buitenland';
  if (/hln\.be\/(economie|geld|tech|wetenschap)/.test(u)) return 'economie';
  if (/hln\.be\/opinie/.test(u)) return 'opinie';

  return 'verwijder';
}

function categoriseWSJ(url) {
  if (!url) return null;
  const u = url.toLowerCase();

  if (/wsj\.com\/(business|market-data|economy|finance|tech|news\/financial|wealth)/.test(u)) return 'economie';
  if (/wsj\.com\/(politics|news\/policy)/.test(u)) return 'politiek';
  if (/wsj\.com\/opinion/.test(u)) return 'opinie';
  if (/wsj\.com\/(world|us-news|news\/europe|news\/asia|news\/africa|news\/middle-east)/.test(u)) return 'buitenland';

  return 'verwijder';
}

function categorise(title) {
  const txt = title.toLowerCase();
  for (const rule of CAT_RULES) {
    if (rule.words.some(w => txt.includes(w))) return rule.cat;
  }
  return 'overig';
}

// ── FETCH ONE FEED ────────────────────────────────────────────────────────────
function decodeEntities(str) {
  // DOMParser is de meest betrouwbare manier om HTML-entities te decoderen
  try {
    const doc = new DOMParser().parseFromString(str, 'text/html');
    return doc.documentElement.textContent;
  } catch { return str; }
}

async function fetchFeed(url, meta) {
  const api = RSS2JSON_BASE + encodeURIComponent(url);
  const res  = await fetch(api, { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.status !== 'ok' || !Array.isArray(data.items)) throw new Error(data.message || 'rss2json error');

  return data.items.map(item => {
    let image = item.thumbnail || item.enclosure?.link || null;
    if (image && /1x1|pixel|track|blank|spacer/i.test(image)) image = null;
    const title   = decodeEntities(decodeEntities((item.title || '').trim()));
    const link    = item.link || item.guid || '';
    const pubDate = item.pubDate || null;
    const desc    = (item.description || item.content || '').trim();

    let cat;
    if (meta.id === 'hln') {
      const hlnCat = categoriseHLN(link);
      if (hlnCat === 'verwijder') return null;
      cat = hlnCat;
    } else if (meta.id === 'wsj') {
      const wsjCat = categoriseWSJ(link);
      if (wsjCat === 'verwijder') return null;
      cat = wsjCat;
    } else {
      cat = categorise(title);
    }

    return { title, link, pubDate, image, cat, desc, source: meta };
  }).filter(a => a && a.title && a.link && a.cat !== 'sport');
}

// ── GEMINI CATEGORISATIE ─────────────────────────────────────────────────────
const GROQ_URL = '/api/groq'; // API key zit veilig in Vercel environment variable
const GEMINI_CATS = ['binnenland','buitenland','politiek','economie','overig'];
const GEMINI_CACHE_KEY = 'debrief_groq_cache';
const GEMINI_CACHE_TTL = 24 * 60 * 60 * 1000; // 24 uur in ms

function cacheKey(title) {
  return title.trim().toLowerCase();
}

function geminiCacheGet(title) {
  try {
    const raw = localStorage.getItem(GEMINI_CACHE_KEY);
    if (!raw) return null;
    const cache = JSON.parse(raw);
    const entry = cache[cacheKey(title)];
    if (!entry) return null;
    if (Date.now() - entry.ts > GEMINI_CACHE_TTL) return null;
    return entry.data || null;
  } catch { return null; }
}

function geminiCacheSet(entries) {
  // entries = [{ title, data: { cat, nl? } }]
  try {
    const raw = localStorage.getItem(GEMINI_CACHE_KEY);
    const cache = raw ? JSON.parse(raw) : {};
    const now = Date.now();
    for (const k of Object.keys(cache)) {
      if (now - cache[k].ts > GEMINI_CACHE_TTL) delete cache[k];
    }
    for (const { title, data } of entries) {
      cache[cacheKey(title)] = { data, ts: now };
    }
    localStorage.setItem(GEMINI_CACHE_KEY, JSON.stringify(cache));
  } catch {}
}

const GROQ_BATCH_SIZE = 20; // Groq free tier: max tokens per request

async function groqBatch(batch) {
  // Stuurt één batch naar Groq en geeft { catMap, titleMap } terug voor die batch
  const inputJson = JSON.stringify(batch.map(a => ({ i: a.index, t: a.title, tr: a.translate })));
  const prompt = `Je krijgt een lijst nieuwsartikels. Voor elk artikel:
1. Kies een categorie uit: binnenland, buitenland, politiek, economie, overig
   - binnenland: nieuws over België intern
   - buitenland: internationaal nieuws, buitenlandse gebeurtenissen
   - politiek: politiek, verkiezingen, beleid, regeringen
   - economie: economie, financiën, bedrijven, markten, tech, wetenschap
   - overig: alles wat niet past (opinie, cultuur, sport, enz.)
2. Als "tr" true is: vertaal de titel naar natuurlijk Nederlands. Als "tr" false is: laat "nl" weg.

Geef ALLEEN een JSON-object terug, geen uitleg, geen markdown.
Formaat: {"0":{"cat":"categorie","nl":"vertaling"},"1":{"cat":"categorie"},...}
De sleutels zijn de "i"-waarden.

Artikels: ${inputJson}`;

  const res = await fetch(GROQ_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      temperature: 0,
      messages: [{ role: 'user', content: prompt }]
    }),
    signal: AbortSignal.timeout(30000)
  });
  if (!res.ok) throw new Error(`Groq HTTP ${res.status}`);
  const data = await res.json();
  const text  = data.choices?.[0]?.message?.content || '{}';
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

async function groqProcess(articles) {
  if (!articles.length) return { catMap: {}, titleMap: {} };

  const catMap = {}, titleMap = {};
  const uncached = [];
  for (const a of articles) {
    const hit = geminiCacheGet(a.title);
    if (hit !== null) {
      catMap[String(a.index)] = hit.cat;
      if (hit.nl) titleMap[String(a.index)] = hit.nl;
    } else {
      uncached.push(a);
    }
  }

  if (!uncached.length) return { catMap, titleMap };

  // Splits in batches van GROQ_BATCH_SIZE om 429s te vermijden
  for (let i = 0; i < uncached.length; i += GROQ_BATCH_SIZE) {
    const batch = uncached.slice(i, i + GROQ_BATCH_SIZE);
    try {
      const parsed  = await groqBatch(batch);
      const toCache = [];
      for (const a of batch) {
        const entry = parsed[String(a.index)] || {};
        const cat   = GEMINI_CATS.includes((entry.cat || '').toLowerCase())
          ? entry.cat.toLowerCase() : 'overig';
        catMap[String(a.index)] = cat;
        if (a.translate && entry.nl) titleMap[String(a.index)] = entry.nl;
        toCache.push({ title: a.title, data: { cat, nl: entry.nl || null } });
      }
      geminiCacheSet(toCache);
    } catch (e) {
      // Bij fout in een batch: categoriseer de batch als 'overig' en ga verder
      console.warn(`Groq batch ${i}–${i + batch.length} mislukt:`, e.message);
      for (const a of batch) catMap[String(a.index)] = 'overig';
    }
  }

  return { catMap, titleMap };
}

// ── LOAD ALL ──────────────────────────────────────────────────────────────────
async function loadAll() {
  const tasks = SOURCES.flatMap(src =>
    src.urls.map(url => ({ url, meta: { name:src.name, region:src.region, id:src.id } }))
  );
  _done = 0; _total = tasks.length;
  bar.style.width = '0%';

  const errors = [];
  const settled = await Promise.allSettled(
    tasks.map(t =>
      fetchFeed(t.url, t.meta)
        .then(items => { tickProgress(); return items; })
        .catch(e    => { tickProgress(); errors.push(`${t.meta.name}: ${e.message}`); return []; })
    )
  );

  let arts = settled.flatMap(r => r.status==='fulfilled' ? r.value : []);

  // Groq: categorisatie (VRT + Euronews) + vertaling (Euronews)
  // WSJ wordt gecategoriseerd via categoriseWSJ() — geen Groq nodig
  // Sport-artikelen worden uitgesloten — Groq kent geen 'sport' categorie en zou ze fout labelen
  const groqArts = arts
    .map((a, i) => ({
      index: i,
      title: a.title,
      needsGroq: ['vrt','euronews'].includes(a.source.id) && a.cat !== 'sport',
      translate: ['euronews'].includes(a.source.id)
    }))
    .filter(a => a.needsGroq);

  if (groqArts.length) {
    try {
      const { catMap, titleMap } = await groqProcess(groqArts);
      groqArts.forEach(a => {
        if (catMap[String(a.index)] !== undefined)
          arts[a.index].cat = catMap[String(a.index)];
        if (titleMap[String(a.index)])
          arts[a.index].title = titleMap[String(a.index)];
      });
    } catch(e) {
      errors.push(`Groq: ${e.message}`);
    }
  }

  // Verwijder sport-artikelen (Groq kent geen 'sport', die komen enkel uit keyword-filter)
  arts = arts.filter(a => a.cat !== 'sport');

  const recent = arts.filter(a => {
    if (!a.pubDate) return false;
    return (Date.now() - new Date(a.pubDate).getTime()) < 24 * 60 * 60 * 1000;
  });
  arts = (recent.length > 0 ? recent : arts)
    .sort((a,b) => new Date(b.pubDate||0) - new Date(a.pubDate||0));

  const seen = new Set();
  allArticles = arts.filter(a => {
    const k = a.title.toLowerCase().replace(/\W/g,'').slice(0,50);
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  return errors;
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function filtered() {
  let arts = allArticles;
  if (activeSource !== 'alle') arts = arts.filter(a => a.source.name === activeSource);
  if (activeTab !== 'alles')   arts = arts.filter(a => a.cat === activeTab);
  return arts;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(errors=[]) {
  const container = document.getElementById('feedContainer');
  const arts = filtered();
  const seenMap = seenLoad();
  let html = '';

  if (errors.length) {
    const names = [...new Set(errors.map(e=>e.split(':')[0]))].join(', ');
    html += `<div class="error-banner">\u26a0\ufe0f Sommige feeds konden niet worden geladen: <strong>${names}</strong></div>`;
  }

  if (!arts.length) {
    html += `<div class="empty-state"><span class="icon">\u{1F4EB}</span><p>Geen artikels voor<br>deze selectie vandaag.</p></div>`;
    container.innerHTML = html; return;
  }

  const [top, ...rest] = arts;
  const topIdx = allArticles.indexOf(top);
  const topSeen = isSeen(top, seenMap);
  html += `<div class="top-story${topSeen ? ' seen' : ''}" data-idx="${topIdx}" style="cursor:pointer">`;
  if (top.image) html += `<img class="top-story-img" src="${esc(top.image)}" alt="" loading="eager" onerror="this.style.display='none'">`;
  html += `<div class="top-story-body">`;
  html += `<div class="meta-row"><span class="label top-badge">Top verhaal</span>${rLabel(top.source.region)}${cLabel(top.cat)}</div>`;
  html += `<h2>${esc(top.title)}</h2>`;
  html += `<div class="meta-row"><span class="source-time">${esc(top.source.name)} \u00b7 ${timeAgo(top.pubDate)}</span></div>`;
  html += `</div></div>`;

  if (rest.length) {
    html += `<div class="section-head"><h3>Meer nieuws</h3><span class="count-chip">${rest.length}</span></div>`;
  }

  for (const art of rest) {
    const idx = allArticles.indexOf(art);
    const seen = isSeen(art, seenMap);
    html += `<div class="article-card${seen ? ' seen' : ''}" data-idx="${idx}" style="cursor:pointer">`;
    if (art.image) {
      html += `<img class="article-card-img" src="${esc(art.image)}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'article-card-placeholder'}))">`;
    } else {
      html += `<div class="article-card-placeholder"></div>`;
    }
    html += `<div class="article-card-body">`;
    html += `<h3>${esc(art.title)}</h3>`;
    html += `<div class="meta-row">${rLabel(art.source.region)}${cLabel(art.cat)}<span class="source-time">${esc(art.source.name)} \u00b7 ${timeAgo(art.pubDate)}</span></div>`;
    html += `</div></div>`;
  }

  container.innerHTML = html;
}

// ── LEESVOORTGANG ─────────────────────────────────────────────────────────────
const SEEN_KEY = 'debrief_seen_v1';
const SEEN_TTL = 7 * 24 * 60 * 60 * 1000; // 7 dagen

function seenLoad() {
  try {
    const raw = JSON.parse(localStorage.getItem(SEEN_KEY) || '{}');
    const now = Date.now();
    // Verwijder entries ouder dan 7 dagen
    for (const k of Object.keys(raw)) if (now - raw[k] > SEEN_TTL) delete raw[k];
    return raw;
  } catch { return {}; }
}
function seenMark(key) {
  try {
    const raw = seenLoad();
    raw[key] = Date.now();
    localStorage.setItem(SEEN_KEY, JSON.stringify(raw));
  } catch {}
}
function seenKey(art) {
  return art.link.slice(-60); // laatste deel van URL als stabiele sleutel
}
function isSeen(art, seenMap) {
  return !!seenMap[seenKey(art)];
}

// ── PULL TO REFRESH ──────────────────────────────────────────────────────────
let ptrStartY = 0, ptrActive = false, ptrTriggered = false;
const ptrIndicator = document.getElementById('ptrIndicator');
const ptrSpinner   = document.getElementById('ptrSpinner');
const ptrText      = document.getElementById('ptrText');
const THRESHOLD    = 80;

document.addEventListener('touchstart', e => {
  if (window.scrollY === 0) {
    ptrStartY = e.touches[0].clientY;
    ptrActive = true;
    ptrTriggered = false;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!ptrActive) return;
  const dist = e.touches[0].clientY - ptrStartY;
  if (dist > 10) {
    ptrIndicator.classList.add('visible');
    if (dist > THRESHOLD) {
      ptrText.textContent = 'Loslaten om te verversen';
      ptrTriggered = true;
    } else {
      ptrText.textContent = 'Trek naar beneden om te verversen';
      ptrTriggered = false;
    }
  }
}, { passive: true });

document.addEventListener('touchend', () => {
  if (ptrTriggered) {
    ptrSpinner.classList.add('spinning');
    ptrText.textContent = 'Verversen…';
    init().then(() => {
      ptrSpinner.classList.remove('spinning');
      ptrIndicator.classList.remove('visible');
    });
  } else {
    ptrIndicator.classList.remove('visible');
  }
  ptrActive = false;
  ptrTriggered = false;
});

init();

// ── POPUP ─────────────────────────────────────────────────────────────────────

function openPopup(art) {
  // Markeer als gelezen
  seenMark(seenKey(art));
  // Dim de kaart meteen zonder volledige re-render
  document.querySelectorAll(`[data-idx="${allArticles.indexOf(art)}"]`).forEach(el => {
    el.classList.add('seen');
  });

  const desc = art.desc || '';
  const clean = desc.replace(/<[^>]*>/g, '').trim();
  document.getElementById('popupTitle').textContent = art.title;
  document.getElementById('popupDesc').textContent = clean || 'Geen beschrijving beschikbaar.';
  document.getElementById('popupBtn').href = articleLink(art);
  document.getElementById('popupOverlay').classList.add('open');
  document.getElementById('popupSheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('open');
  document.getElementById('popupSheet').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('popupOverlay').addEventListener('click', closePopup);
document.getElementById('popupSheet').addEventListener('click', e => { e.stopPropagation(); });
document.getElementById('popupClose').addEventListener('click', e => { e.stopPropagation(); closePopup(); });

// Escape key om te sluiten
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

// Swipe-down om te sluiten
let touchStartY = 0;
const sheet = document.getElementById('popupSheet');
sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
sheet.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - touchStartY > 60) closePopup();
}, { passive: true });

// ── Cache ─────────────────────────────────────────────────────────────────────
let _mktCache = null;

function mktCacheLoad() {
  if (_mktCache) return _mktCache;
  try { _mktCache = JSON.parse(localStorage.getItem(MKT_CACHE_KEY) || '{}'); }
  catch { _mktCache = {}; }
  return _mktCache;
}
function mktCacheFlush() {
  try { localStorage.setItem(MKT_CACHE_KEY, JSON.stringify(_mktCache)); } catch {}
}
function mktCacheGet(key) {
  const s = mktCacheLoad();
  const e = s[key];
  if (!e || Date.now() - e.ts > MKT_CACHE_TTL) return undefined;
  return e.data; // kan null zijn (error sentinel) of echte data
}
function mktCacheSet(key, data) {
  const s   = mktCacheLoad();
  const now = Date.now();
  for (const k of Object.keys(s)) if (now - s[k].ts > MKT_CACHE_TTL * 8) delete s[k];
  s[key] = { data, ts: now };
  mktCacheFlush();
}
function mktCacheSetWithTTL(key, data, ttl) {
  // Sla op met een timestamp die al deels verouderd is zodat de echte TTL korter is
  const s = mktCacheLoad();
  s[key] = { data, ts: Date.now() - (MKT_CACHE_TTL - ttl) };
  mktCacheFlush();
}

// ── API ───────────────────────────────────────────────────────────────────────
const MKT_ERROR_TTL = 60 * 1000; // 1 min: hammer-beveiliging bij fouten

async function mktFetch(endpoint, params) {
  const key    = endpoint + '|' + JSON.stringify(params);
  const cached = mktCacheGet(key);
  if (cached !== undefined) {
    // null = error sentinel (kort gecached), gooi fout zodat UI N/B toont
    if (cached === null) throw new Error('Tijdelijk niet beschikbaar');
    return cached;
  }

  const qs  = new URLSearchParams({ endpoint, ...params }).toString();
  const res = await fetch(`${MARKET_API}?${qs}`, { signal: AbortSignal.timeout(12000) });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
    mktCacheSetWithTTL(key, null, MKT_ERROR_TTL);
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  const data = await res.json();
  if (data.error) {
    mktCacheSetWithTTL(key, null, MKT_ERROR_TTL);
    throw new Error(data.error);
  }
  mktCacheSet(key, data);
  return data;
}

// ── Formattering ──────────────────────────────────────────────────────────────
function fmtPrice(val, ticker) {
  if (val == null) return '—';
  const n = parseFloat(val);
  if (isNaN(n) || n === 0) return '—';
  return (ticker?.prefix || '') +
    n.toLocaleString('nl-BE', { minimumFractionDigits: ticker?.decimals ?? 2, maximumFractionDigits: ticker?.decimals ?? 2 }) +
    (ticker?.suffix || '');
}
function fmtPct(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function pctClass(val) {
  const n = parseFloat(val);
  if (isNaN(n) || n === 0) return 'neu';
  return n > 0 ? 'pos' : 'neg';
}

// ── Detail ────────────────────────────────────────────────────────────────────
async function hydrateAllRows(tickers) {
  if (!tickers.length) return;
  await Promise.allSettled(tickers.map(t => hydrateRow(t)));
}

async function hydrateRow(ticker) {
  const id       = ticker.symbol.replace(/[^a-zA-Z0-9]/g, '_');
  const priceEl  = document.getElementById(`mprice-${id}`);
  const changeEl = document.getElementById(`mchange-${id}`);
  if (!priceEl) return;
  try {
    const q = await mktFetch('quote', { symbol: ticker.src });
    if (!q.c || q.c === 0) { priceEl.textContent = 'N/B'; return; }
    priceEl.textContent  = fmtPrice(q.c, ticker);
    changeEl.textContent = fmtPct(q.dp);
    changeEl.className   = `markt-ticker-change ${pctClass(q.dp)}`;
  } catch {
    priceEl.textContent = 'N/B';
  }
}

function renderTickerList() {
  wlLoad();
  const container  = document.getElementById('marktTickerList');
  const customList = customLoad();

  let html = '';

  if (customList.length) {
    html += '<div class="markt-section-label">Eigen aandelen</div>';
    customList.forEach(t => html += renderTickerRow(t, true));
  }

  html += '<div class="markt-section-label">Marktoverzicht</div>';
  PRESET_TICKERS.forEach(t => html += renderTickerRow(t, false));

  container.innerHTML = html;
  hydrateAllRows([...customList, ...PRESET_TICKERS]);
  initSwipe();
}

// ── Swipe to delete ───────────────────────────────────────────────────────────
let swipeAbortController = null;

function initSwipe() {
  // Verwijder alle vorige document-listeners van de vorige render
  if (swipeAbortController) swipeAbortController.abort();
  swipeAbortController = new AbortController();
  const { signal } = swipeAbortController;

  document.querySelectorAll('.markt-swipe-wrap').forEach(wrap => {
    const row     = wrap.querySelector('.markt-ticker-row');
    const del     = wrap.querySelector('.markt-swipe-delete');
    const symbol  = wrap.dataset.swipeSymbol;
    let startX = 0, currentX = 0, swiping = false, revealed = false;

    row.addEventListener('touchstart', e => {
      startX   = e.touches[0].clientX;
      currentX = 0;
      swiping  = true;
    }, { passive: true });

    row.addEventListener('touchmove', e => {
      if (!swiping) return;
      currentX = e.touches[0].clientX - startX;
      if (currentX > 0) { row.style.transform = 'translateX(0)'; return; }
      const clamped = Math.max(currentX, -80);
      row.style.transform = `translateX(${clamped}px)`;
    }, { passive: true });

    row.addEventListener('touchend', () => {
      swiping = false;
      if (currentX < -40) {
        row.style.transform = 'translateX(-80px)';
        revealed = true;
      } else {
        row.style.transform = 'translateX(0)';
        revealed = false;
      }
    });

    del.addEventListener('click', e => {
      e.stopPropagation();
      wrap.style.transition = 'opacity .2s, height .2s';
      wrap.style.opacity    = '0';
      wrap.style.height     = wrap.offsetHeight + 'px';
      requestAnimationFrame(() => { wrap.style.height = '0'; });
      setTimeout(() => {
        customRemove(symbol);
        renderTickerList();
      }, 220);
    });

    // Klik ergens anders → sluit swipe
    document.addEventListener('touchstart', e => {
      if (revealed && !wrap.contains(e.target)) {
        row.style.transform = 'translateX(0)';
        revealed = false;
      }
    }, { passive: true, signal });
  });
}

// ── Zoeken — via Vercel proxy → TradingView symbol search ────────────────────
async function mktDoSearch() {
  const raw   = document.getElementById('marktSearchInput').value.trim();
  if (!raw) return;
  const errEl = document.getElementById('marktSearchError');
  const btn   = document.getElementById('marktSearchBtn');
  errEl.style.display = 'none';
  btn.textContent     = '…';
  btn.disabled        = true;

  try {
    // Zoek eerst lokaal
    const upper = raw.toUpperCase();
    const all   = [...PRESET_TICKERS, ...customLoad()];
    const local = all.find(t =>
      t.symbol.toUpperCase() === upper || t.src?.toUpperCase() === upper
    );
    if (local) {
      openDetail(local);
      return;
    }

    // Via Vercel proxy → TradingView symbol search
    const qs  = new URLSearchParams({ endpoint: 'search', q: raw }).toString();
    const res = await fetch(`${MARKET_API}?${qs}`, { signal: AbortSignal.timeout(12000) });
    if (!res.ok) throw new Error(`Proxy HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const hits = data?.hits || [];

    if (!hits.length) {
      errEl.textContent   = `"${raw}" niet gevonden.`;
      errEl.style.display = 'block';
      return;
    }

    showSearchResults(hits);
  } catch (e) {
    const msg = e.message.toLowerCase().includes('rate limit')
      ? 'Zoeken tijdelijk niet beschikbaar. Probeer opnieuw.'
      : 'Zoeken mislukt: ' + e.message;
    errEl.textContent   = msg;
    errEl.style.display = 'block';
  } finally {
    btn.textContent = 'Zoek';
    btn.disabled    = false;
  }
}

let _searchHits = [];

function showSearchResults(hits) {
  _searchHits = hits;
  const container = document.getElementById('marktTickerList');
  let html = '<div class="markt-section-label">Zoekresultaten</div>';

  hits.forEach((h, i) => {
    const display = h.description || h.symbol;
    const exch    = h.exchange || '';
    html += `
      <div class="markt-ticker-row markt-search-result" data-hit-index="${i}">
        <div class="markt-ticker-info">
          <div class="markt-ticker-symbol">${h.symbol}</div>
          <div class="markt-ticker-name">${display}</div>
        </div>
        <div class="markt-ticker-right">
          <div class="markt-ticker-change neu" style="font-size:10px;padding:2px 6px">${exch}</div>
        </div>
      </div>`;
  });

  html += `<div style="padding:12px 4px">
    <button id="marktSearchBack" style="background:none;border:none;color:var(--accent);font-family:var(--font-sans);font-size:13px;font-weight:600;cursor:pointer;padding:0">← Terug</button>
  </div>`;
  container.innerHTML = html;

  document.getElementById('marktSearchBack').addEventListener('click', () => {
    renderTickerList();
    document.getElementById('marktSearchInput').value = '';
  });

  container.querySelectorAll('.markt-search-result').forEach(row => {
    row.addEventListener('click', () => {
      const h      = _searchHits[parseInt(row.dataset.hitIndex)];
      const tvSym  = h.full_name || `${h.exchange}:${h.symbol}`;
      const ticker = {
        symbol:   h.symbol,
        src:      h.symbol,
        tv:       tvSym,
        name:     h.description || h.symbol,
        type:     h.type || 'stock',
        decimals: 2, prefix: '', suffix: '',
      };
      customAdd(ticker);
      document.getElementById('marktSearchInput').value = '';
      openDetail(ticker);
    });
  });
}
function showDetailPanel() {
  document.getElementById('marktTickerList').style.display = 'none';
  document.getElementById('marktSearchWrap').style.display = 'none';
  document.getElementById('marktDetail').style.display     = 'block';
}
function showListPanel() {
  document.getElementById('marktDetail').style.display     = 'none';
  document.getElementById('marktTickerList').style.display = 'block';
  document.getElementById('marktSearchWrap').style.display = 'block';
  const wrap = document.getElementById('marktTVWidget');
  if (wrap) wrap.innerHTML = '';
  mktCurrentTicker = null;
}

async function openDetail(ticker) {
  mktCurrentTicker = ticker;
  mktCurrentPeriod = '1day';
  showDetailPanel();
  document.getElementById('marktDetailName').textContent   = ticker.name;
  document.getElementById('marktDetailSymbol').textContent = ticker.symbol;
  document.getElementById('marktDetailPrice').textContent  = '…';
  document.getElementById('marktDetailChange').textContent = '';
  document.getElementById('marktDetailChange').className   = 'markt-detail-change neu';
  document.getElementById('marktStatsRow').innerHTML       = '';
  document.querySelectorAll('.markt-period').forEach(b =>
    b.classList.toggle('active', b.dataset.period === '1day'));
  document.getElementById('marktCustomDates').style.display = 'none';
  updateWatchlistBtn();
  loadQuote();
  buildTVWidget(ticker.tv, mktCurrentPeriod);
}

function updateWatchlistBtn() {
  const btn  = document.getElementById('marktWatchlistBtn');
  const inWl = wlHas(mktCurrentTicker?.symbol);
  btn.textContent = inWl ? '✓ In watchlist' : '+ Watchlist';
  btn.className   = `markt-watchlist-btn ${inWl ? 'remove' : 'add'}`;
}

// ── TradingView widget ────────────────────────────────────────────────────────
function buildTVWidget(tvSymbol, period, dateFrom, dateTo) {
  const wrap = document.getElementById('marktTVWidget');
  if (!wrap) return;
  wrap.innerHTML = '';

  const cfg  = TV_RANGE[period] || TV_RANGE['1day'];
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

  const container = document.createElement('div');
  container.className = 'tradingview-widget-container';
  container.style.cssText = 'height:100%;width:100%';

  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container__widget';
  inner.style.cssText = 'height:100%;width:100%';
  container.appendChild(inner);

  const widgetConfig = {
    autosize:            true,
    symbol:              tvSymbol,
    interval:            cfg.interval,
    timezone:            'Europe/Brussels',
    theme:               dark ? 'dark' : 'light',
    style:               '3',
    locale:              'nl_BE',
    hide_top_toolbar:    true,
    hide_legend:         true,
    hide_side_toolbar:   true,
    withdateranges:      false,
    save_image:          false,
    allow_symbol_change: false,
    isTransparent:       true,
    support_host:        'https://www.tradingview.com',
  };

  // Gebruik from/to bij aangepaste periode, anders de vooraf ingestelde range
  if (period === 'custom' && dateFrom && dateTo) {
    widgetConfig.from = Math.floor(new Date(dateFrom).getTime() / 1000);
    widgetConfig.to   = Math.floor(new Date(dateTo).getTime() / 1000);
  } else {
    widgetConfig.range = cfg.range;
  }

  const script = document.createElement('script');
  script.type  = 'text/javascript';
  script.src   = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  script.async = true;
  script.innerHTML = JSON.stringify(widgetConfig);

  container.appendChild(script);
  wrap.appendChild(container);
}

async function loadQuote(period) {
  if (!mktCurrentTicker) return;
  const chEl = document.getElementById('marktDetailChange');
  chEl.textContent = '…';
  chEl.className   = 'markt-detail-change neu';
  try {
    const p = period || mktCurrentPeriod;
    if (p === '1day' || p === 'custom') {
      // Vandaag (of eigen periode): toon huidige prijs + dagwijziging
      const q = await mktFetch('quote', { symbol: mktCurrentTicker.src });
      document.getElementById('marktDetailPrice').textContent = fmtPrice(q.c, mktCurrentTicker);
      chEl.textContent = fmtPct(q.dp) + ' vandaag';
      chEl.className   = `markt-detail-change ${pctClass(q.dp)}`;
    } else {
      // Andere periodes: haal eerste + laatste koers op via pct endpoint
      const [q, pctData] = await Promise.all([
        mktFetch('quote', { symbol: mktCurrentTicker.src }),
        mktFetch('pct',   { symbol: mktCurrentTicker.src, period: p }),
      ]);
      document.getElementById('marktDetailPrice').textContent = fmtPrice(q.c, mktCurrentTicker);
      if (pctData?.dp != null) {
        const labels = { '1month':'1M', '6month':'6M', '1year':'1J' };
        chEl.textContent = fmtPct(pctData.dp) + ' ' + (labels[p] || p);
        chEl.className   = `markt-detail-change ${pctClass(pctData.dp)}`;
      } else {
        chEl.textContent = fmtPct(q.dp) + ' vandaag';
        chEl.className   = `markt-detail-change ${pctClass(q.dp)}`;
      }
    }
  } catch (e) {
    document.getElementById('marktDetailPrice').textContent = 'Fout';
    chEl.textContent = e.message;
    chEl.className   = 'markt-detail-change neg';
  }
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('marktBackBtn').addEventListener('click', () => { showListPanel(); renderTickerList(); });
document.getElementById('marktWatchlistBtn').addEventListener('click', () => {
  if (!mktCurrentTicker) return;
  wlHas(mktCurrentTicker.symbol) ? wlRemove(mktCurrentTicker.symbol) : wlAdd(mktCurrentTicker);
  updateWatchlistBtn();
});
document.getElementById('marktSearchBtn').addEventListener('click', mktDoSearch);
document.getElementById('marktSearchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') mktDoSearch();
});
document.getElementById('marktSearchInput').addEventListener('input', () => {
  document.getElementById('marktSearchError').style.display = 'none';
});
document.getElementById('marktTickerList').addEventListener('click', e => {
  const row = e.target.closest('.markt-ticker-row');
  if (!row || row.classList.contains('markt-search-result')) return;
  const all    = [...PRESET_TICKERS, ...customLoad()];
  const ticker = all.find(t => t.symbol === row.dataset.symbol);
  if (ticker) openDetail(ticker);
});
document.getElementById('marktPeriodRow').addEventListener('click', e => {
  const btn = e.target.closest('.markt-period');
  if (!btn) return;
  const period = btn.dataset.period;
  document.querySelectorAll('.markt-period').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (period === 'custom') {
    document.getElementById('marktCustomDates').style.display = 'flex';
    return;
  }
  document.getElementById('marktCustomDates').style.display = 'none';
  mktCurrentPeriod = period;
  if (mktCurrentTicker) {
    buildTVWidget(mktCurrentTicker.tv, mktCurrentPeriod);
    loadQuote(mktCurrentPeriod);
  }
});
document.getElementById('marktDateApply').addEventListener('click', () => {
  if (!mktCurrentTicker) return;
  const from = document.getElementById('marktDateFrom').value;
  const to   = document.getElementById('marktDateTo').value;
  // Bouw widget met aangepast bereik; gebruik '1year' als fallback wanneer datums ontbreken
  const period = (from && to) ? 'custom' : '1year';
  buildTVWidget(mktCurrentTicker.tv, period, from, to);
});

// ── TAB SWIPE ─────────────────────────────────────────────────────────────────
const TAB_ORDER = ['alles', 'binnenland', 'buitenland', 'politiek', 'economie', 'markt'];
let swipeTabStartX = 0, swipeTabStartY = 0, swipeTabActive = false;

document.getElementById('feedContainer').addEventListener('touchstart', e => {
  swipeTabStartX = e.touches[0].clientX;
  swipeTabStartY = e.touches[0].clientY;
  swipeTabActive = true;
}, { passive: true });

document.getElementById('feedContainer').addEventListener('touchend', e => {
  if (!swipeTabActive) return;
  swipeTabActive = false;
  const dx = e.changedTouches[0].clientX - swipeTabStartX;
  const dy = e.changedTouches[0].clientY - swipeTabStartY;
  // Alleen horizontale swipes van >60px met beperkte verticale beweging
  if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.6) return;
  const currentIdx = TAB_ORDER.indexOf(activeTab);
  const nextIdx    = dx < 0
    ? Math.min(currentIdx + 1, TAB_ORDER.length - 1)
    : Math.max(currentIdx - 1, 0);
  if (nextIdx === currentIdx) return;
  const nextTab = TAB_ORDER[nextIdx];
  // Activeer de tab alsof de gebruiker erop klikt
  document.querySelector(`[data-tab="${nextTab}"]`)?.click();
}, { passive: true });

// ── Tab switching ─────────────────────────────────────────────────────────────
document.getElementById('catTabs').addEventListener('click', e => {
  const b = e.target.closest('.tab');
  if (!b) return;
  const tab    = b.dataset.tab;
  const panel  = document.getElementById('marktPanel');
  const feed   = document.getElementById('feedContainer');
  const srcRow = document.querySelector('.source-row-wrap');

  document.querySelectorAll('#catTabs .tab').forEach(t => t.classList.remove('active'));
  b.classList.add('active');

  if (tab === 'markt') {
    panel.style.display = 'block';
    feed.style.display  = 'none';
    if (srcRow) srcRow.style.display = 'none';
    if (!mktInited) {
      mktInited = true;
      wlLoad();
      renderTickerList();
    }
  } else {
    panel.style.display = 'none';
    feed.style.display  = 'block';
    if (srcRow) srcRow.style.display = '';
    const wrap = document.getElementById('marktTVWidget');
    if (wrap) wrap.innerHTML = '';
    activeTab = tab;
    render();
  }
});
